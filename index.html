<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Study Monitor</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background: radial-gradient(circle at top,#ff4fd855,transparent 40%),
linear-gradient(180deg,#0b0012,#050008);
color:white;
padding:25px;
}

.container{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

.panel{
background:rgba(20,10,30,.92);
border:1px solid rgba(255,105,210,.45);
border-radius:24px;
padding:20px;
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(255,0,170,.25);
margin-bottom:20px;
}

.title{
font-size:52px;
font-weight:800;
margin-bottom:25px;
}

.pink{color:#ff4fd8;}

.cardTitle{
font-size:12px;
letter-spacing:2px;
opacity:.6;
margin-bottom:15px;
text-transform:uppercase;
}

.bigTimer{
font-size:72px;
font-weight:800;
color:#ff7cf0;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.btn{
border:none;
padding:14px 20px;
border-radius:16px;
cursor:pointer;
font-weight:700;
color:white;
}

.green{
background:linear-gradient(135deg,#ff4fd8,#ff92e9);
}

.red{
background:linear-gradient(135deg,#ff4f88,#ff7ca8);
}

.dark{
background:#2a1635;
}

input{
width:100%;
background:#1a0f22;
border:1px solid rgba(255,105,210,.25);
padding:14px;
border-radius:14px;
color:white;
margin-bottom:12px;
}

.chat{
height:250px;
overflow:auto;
margin-bottom:12px;
}

.message{
background:#1a0f22;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border:1px solid rgba(255,105,210,.15);
}

/* ТОП СТУДЕНТОВ */
.topUser{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:#1a0f22;
border-radius:16px;
margin-bottom:10px;
border:1px solid rgba(255,105,210,.2);
}

.rank{
color:#ff4fd8;
font-weight:800;
margin-right:10px;
}
</style>
</head>

<body>

<div class="title">
Статусы <span class="pink">группы</span>
</div>

<div class="container">

<!-- LEFT -->
<div>

<div class="panel">
<div class="cardTitle">Сессия учебы</div>
<div class="bigTimer" id="timer">00:00</div>

<div class="buttons">
<button class="btn green" onclick="startStudy()">▶️ Начать</button>
<button class="btn red" onclick="stopStudy()">■ Стоп</button>
</div>
</div>

<div class="panel">
<div class="cardTitle">Топ студентов</div>
<div id="leaderboard"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="panel">
<div class="cardTitle">Авторизация</div>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">

<div class="buttons">
<button class="btn green" onclick="signUp()">Регистрация</button>
<button class="btn dark" onclick="login()">Вход</button>
</div>
</div>

<div class="panel">
<div class="cardTitle">Чат</div>
<div class="chat" id="chat"></div>

<input id="messageInput" placeholder="Сообщение...">
<button class="btn green" onclick="sendMessage()">Отправить</button>
</div>

</div>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://qbyonzuldevyddkpnole.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFieW9uenVsZGV2eWRka3Bub2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg4MzIsImV4cCI6MjA5NDE0NDgzMn0.d0Kb-l0jwLKB9kBARPKzk7hmDk-otW08HjJpA7fHWyM"
)

let seconds=0
let timerInterval

function updateTimer(){
seconds++
let m=Math.floor(seconds/60)
let s=seconds%60
document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")
}

async function signUp(){
const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabaseClient.auth.signUp({email,password})
if(error) return alert(error.message)

alert("Аккаунт создан")
}

async function login(){
const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabaseClient.auth.signInWithPassword({email,password})
if(error) return alert(error.message)

alert("Вход выполнен")
}

async function startStudy(){
timerInterval=setInterval(updateTimer,1000)

const {data:{user}}=await supabaseClient.auth.getUser()
if(!user) return alert("Сначала войди")

await supabaseClient.from("study_sessions").insert({
user_id:user.id,
started_at:new Date()
})
}

function stopStudy(){
clearInterval(timerInterval)
}

async function loadLeaderboard(){
const {data}=await supabaseClient
.from("profiles")
.select("*")
.order("total_study_seconds",{ascending:false})
.limit(10)

if(!data) return

document.getElementById("leaderboard").innerHTML =
data.map((u,i)=>`
<div class="topUser">
<div>
<span class="rank">#${i+1}</span>
${u.username || "User"}
</div>
<div>
${Math.floor((u.total_study_seconds||0)/3600)} ч
</div>
</div>
`).join("")
}

async function sendMessage(){
const input=document.getElementById("messageInput")
if(!input.value) return

const {data:{user}}=await supabaseClient.auth.getUser()
if(!user) return alert("Войди")

await supabaseClient.from("messages").insert({
user_id:user.id,
text:input.value
})

input.value=""
loadMessages()
}

async function loadMessages(){
const {data}=await supabaseClient
.from("messages")
.select("*")
.order("created_at",{ascending:false})
.limit(20)

if(!data) return

document.getElementById("chat").innerHTML =
data.map(m=>`<div class="message">💬 ${m.text}</div>`).join("")
}

loadLeaderboard()
loadMessages()
setInterval(loadMessages,3000)

</script>

</body>
</html>
